name: Generate Snake

on:
  # Corre automaticamente a cada 24 horas
  schedule:
    - cron: "0 0 * * *"
  
  # Permite correr manualmente a qualquer momento
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Faz o download do repositório
      - uses: actions/checkout@v3

      # Gera a animação da cobrinha com base nos teus commits
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: Samelafarias
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}